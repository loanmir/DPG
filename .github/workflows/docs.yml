name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install Graphviz so Sphinx can import modules that reference it
      - name: Install system dependencies
        run: sudo apt-get install -y graphviz

      - name: Install package + docs dependencies
        run: pip install ".[docs]"

      # -W  → warnings become errors
      # --keep-going  → report ALL warnings, not just the first
      - name: Build Sphinx docs
        run: sphinx-build -W --keep-going -b html docs/ docs/_build/html

      - name: Upload HTML docs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-docs
          path: docs/_build/html/
          retention-days: 7
